name: terraform

on:
  pull_request:
  push:
    branches:
      - main

# No real infrastructure is created, so no cloud credentials are required.
# Modules carry no backend, so they init with -backend=false. Environments use a
# local backend (no credentials needed), so they run a normal `terraform init`
# — required for `terraform plan` to work.

permissions:
  contents: read

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"
      - name: terraform fmt
        run: terraform fmt -check -recursive

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - name: Init TFLint
        run: tflint --init
      - name: Run TFLint (recursive)
        run: tflint --recursive --config "$PWD/.tflint.hcl"

  validate-and-test:
    name: Validate + test modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - naming
          - network
          - database
          - queue
          - iam
          - secrets
          - service
          - monitoring
          - dns
          - manifest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"
      - name: Init
        working-directory: modules/${{ matrix.module }}
        run: terraform init -backend=false
      - name: Validate
        working-directory: modules/${{ matrix.module }}
        run: terraform validate
      - name: Test
        working-directory: modules/${{ matrix.module }}
        run: terraform test

  environments:
    name: Validate + test environments
    runs-on: ubuntu-latest
    needs: validate-and-test
    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - staging
          - prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"
      - name: Init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -input=false
      - name: Validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate
      - name: Test
        working-directory: environments/${{ matrix.environment }}
        run: terraform test
      - name: Plan
        working-directory: environments/${{ matrix.environment }}
        run: terraform plan -input=false
